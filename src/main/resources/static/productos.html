<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — Stock Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <a href="stock.html" class="btn-back">← Categorías</a>
            <h1 class="page-title" id="categoria-titulo">Cargando...</h1>
        </div>
        <a href="inicio.html" class="header-logo-center">📦 Stock Manager</a>
    </header>

    <main class="app-main">

        <div class="panel" id="form-producto">
            <p class="panel-title">Agregar / Editar Producto</p>
            <div class="form-grid">
                <div class="form-field">
                    <label>Nombre</label>
                    <input type="text" id="prod-nombre" placeholder="Nombre del producto">
                </div>
                <div class="form-field">
                    <label>Descripción</label>
                    <input type="text" id="prod-desc" placeholder="Descripción breve">
                </div>
                <div class="form-field">
                    <label>Precio ($)</label>
                    <input type="number" id="prod-precio" placeholder="0.00" min="0" step="0.01">
                </div>
                <div class="form-field">
                    <label>Stock</label>
                    <input type="number" id="prod-stock" placeholder="0" min="0">
                </div>
                <div class="form-field form-field-btn">
                    <button id="btn-save-prod" class="btn btn-primary">Guardar producto</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <p class="panel-title">Buscar Producto</p>
            <div class="form-inline">
                <input type="text" id="filter-producto" placeholder="Buscar por nombre...">
            </div>
        </div>

        <div class="panel">
            <div class="stock-toolbar" style="margin-bottom: 16px;">
                <p class="panel-title" style="margin-bottom: 0;">Productos</p>
                <span id="productos-contador" class="categorias-contador"></span>
            </div>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-productos"></tbody>
                </table>
            </div>
        </div>

        <div id="paginacion-productos" class="paginacion"></div>

    </main>

    <script src="productos.js"></script>
</body>
</html>
